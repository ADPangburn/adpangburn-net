<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row { display: flex; flex-direction: column; gap: 18px; }
  .specimen { display: flex; align-items: baseline; gap: 18px; }
  .specimen .glyph { font-size: 38px; line-height: 1; color: var(--fg); letter-spacing: -0.02em; }
  .specimen .info { display: flex; flex-direction: column; gap: 2px; }
  .specimen .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-4); letter-spacing: 0.14em; text-transform: uppercase; font-weight: 600; }
  .specimen .name { font-family: var(--font-mono); font-size: 12px; color: var(--fg-3); }
</style>
</head>
<body><div class="card-frame">
  <div class="row">
    <div class="specimen">
      <div class="glyph sans" style="font-weight:600">Aa Bb · 017</div>
      <div class="info">
        <div class="label">// body · headings · UI</div>
        <div class="name">IBM Plex Sans</div>
      </div>
    </div>
    <div class="specimen">
      <div class="glyph mono" style="font-weight:500">Aa Bb · 017</div>
      <div class="info">
        <div class="label">// code · meta · prompt</div>
        <div class="name">IBM Plex Mono</div>
      </div>
    </div>
    <div class="specimen">
      <div class="glyph mono" style="font-weight:500;color:var(--fg-3)">Aa Bb · 017</div>
      <div class="info">
        <div class="label">// fallback mono</div>
        <div class="name">JetBrains Mono</div>
      </div>
    </div>
  </div>
</div></body></html>

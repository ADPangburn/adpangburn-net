<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row { display:flex; align-items:flex-end; gap: 24px; padding: 12px 0; flex-wrap: wrap; }
  .tile { background: var(--bg); border: 1px solid var(--rule-strong); display:flex; align-items:center; justify-content:center; position: relative; gap: 0; }
  .tile .glyph { font-family: var(--font-mono); font-weight: 700; color: var(--fg); line-height: 1; letter-spacing: -0.04em; }
  .tile .cur { background: var(--red); display: inline-block; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-4); letter-spacing: 0.14em; text-transform: uppercase; margin-top: 8px; text-align:center; font-weight: 600; }
  .col { display:flex; flex-direction:column; align-items:center; }
</style>
</head>
<body><div class="card-frame">
  <div class="row">
    <div class="col">
      <div class="tile" style="width:120px;height:80px;gap:4px">
        <span class="glyph" style="font-size:38px">adp</span>
        <span class="cur" style="width:18px;height:30px;margin-bottom:4px"></span>
      </div>
      <div class="lbl">mark · 120 × 80</div>
    </div>
    <div class="col">
      <div class="tile" style="width:80px;height:48px;gap:3px">
        <span class="glyph" style="font-size:22px">adp</span>
        <span class="cur" style="width:10px;height:18px;margin-bottom:2px"></span>
      </div>
      <div class="lbl">mark · 80 × 48</div>
    </div>
    <div class="col">
      <div class="tile" style="width:32px;height:32px">
        <span class="cur" style="width:20px;height:20px"></span>
      </div>
      <div class="lbl">favicon · 32</div>
    </div>
    <div class="col">
      <div class="tile" style="width:16px;height:16px">
        <span class="cur" style="width:10px;height:10px"></span>
      </div>
      <div class="lbl">favicon · 16</div>
    </div>
    <div class="col">
      <div class="tile" style="width:120px;height:80px;gap:4px;background:#FAFAFA;border-color:#52525B">
        <span class="glyph" style="font-size:38px;color:#0A0A0A">adp</span>
        <span class="cur" style="width:18px;height:30px;margin-bottom:4px"></span>
      </div>
      <div class="lbl">inverted</div>
    </div>
  </div>
  <div style="margin-top:14px;font-family:var(--font-mono);font-size:10px;color:var(--fg-4);letter-spacing:0.14em;text-transform:uppercase;font-weight:600;text-align:center">// adp + cursor at logo sizes · favicon collapses to just the cursor · adp lifts the github handle</div>
</div></body></html>

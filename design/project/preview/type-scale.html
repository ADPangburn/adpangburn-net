<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .step { display: grid; grid-template-columns: 80px 1fr; gap: 16px; align-items: baseline; padding: 6px 0; border-bottom: 1px solid var(--rule); }
  .step:last-child { border-bottom: 0; }
  .tag-px { font-family: var(--font-mono); font-size: 10px; color: var(--fg-4); letter-spacing: 0.10em; text-transform: uppercase; }
  .sample { font-family: var(--font-sans); color: var(--fg); line-height: 1.1; }
</style>
</head>
<body><div class="card-frame">
  <div class="step"><div class="tag-px">40 / h1</div><div class="sample" style="font-size:32px;font-weight:700;letter-spacing:-0.025em">Notes from inside</div></div>
  <div class="step"><div class="tag-px">32 / h2</div><div class="sample" style="font-size:26px;font-weight:600;letter-spacing:-0.02em">The retry loop</div></div>
  <div class="step"><div class="tag-px">24 / h3</div><div class="sample" style="font-size:20px;font-weight:600;letter-spacing:-0.015em">A sub-section</div></div>
  <div class="step"><div class="tag-px">13 / h4</div><div class="sample mono" style="font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--fg-3)">// section label</div></div>
  <div class="step"><div class="tag-px">15 / body</div><div class="sample" style="font-size:15px;font-weight:400;line-height:1.55;color:var(--fg-2)">Body text at 15px sets at 1.55 line-height.</div></div>
  <div class="step"><div class="tag-px">13 / sm</div><div class="sample" style="font-size:13px;color:var(--fg-3)">Small text for captions and asides.</div></div>
  <div class="step"><div class="tag-px">11 / meta</div><div class="sample mono" style="font-size:11px;color:var(--fg-4);letter-spacing:0.10em;text-transform:uppercase">note_017 · 2026·03·12 · 8 min read</div></div>
</div></body></html>

<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .stack { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 18px; }
  .item { display:flex; flex-direction:column; gap: 6px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-4); letter-spacing: 0.14em; text-transform: uppercase; font-weight: 600; }
  .field-lbl { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); letter-spacing: 0.04em; }
  .input {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--fg);
    background: var(--bg);
    border: 1px solid var(--fg-5);
    border-radius: 2px;
    padding: 8px 12px;
    width: 100%;
    letter-spacing: 0.04em;
    box-sizing: border-box;
  }
  .input::placeholder { color: var(--fg-5); }
  .input.focus { border-color: var(--red); box-shadow: 0 0 0 1px var(--red); outline: none; }
  .input.disabled { background: var(--surface); color: var(--fg-5); border-color: var(--rule-bright); border-style: dashed; }
</style>
</head>
<body><div class="card-frame">
  <div class="stack">
    <div class="item">
      <div class="lbl">// rest</div>
      <input class="input" placeholder="your@email.com">
    </div>
    <div class="item">
      <div class="lbl">// focus</div>
      <input class="input focus" value="aaron@pangburn.net">
    </div>
    <div class="item">
      <div class="lbl">// with label</div>
      <div class="field-lbl">email</div>
      <input class="input" placeholder="your@email.com">
    </div>
    <div class="item">
      <div class="lbl">// disabled</div>
      <input class="input disabled" value="—" disabled>
    </div>
  </div>
</div></body></html>

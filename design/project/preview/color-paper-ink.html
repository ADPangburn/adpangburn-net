<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .swatches { display:grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
  .sw { display:flex; flex-direction:column; gap:6px; }
  .chip { aspect-ratio: 1.4; border-radius: 2px; border: 1px solid var(--rule-strong); }
  .name { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); letter-spacing: 0.04em; }
  .hex  { font-family: var(--font-mono); font-size: 9px; color: var(--fg-4); }
  .group { display: flex; flex-direction: column; gap: 12px; }
  .group + .group { margin-top: 16px; }
  .gr-lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-4); letter-spacing: 0.14em; text-transform: uppercase; font-weight: 600; }
</style>
</head>
<body><div class="card-frame">
  <div class="group">
    <div class="gr-lbl">// surfaces</div>
    <div class="swatches">
      <div class="sw"><div class="chip" style="background:#0A0A0A"></div><div class="name">bg</div><div class="hex">0A0A0A</div></div>
      <div class="sw"><div class="chip" style="background:#111111"></div><div class="name">bg-2</div><div class="hex">111111</div></div>
      <div class="sw"><div class="chip" style="background:#171717"></div><div class="name">surface</div><div class="hex">171717</div></div>
      <div class="sw"><div class="chip" style="background:#1F1F1F"></div><div class="name">surface-2</div><div class="hex">1F1F1F</div></div>
      <div class="sw"><div class="chip" style="background:#2A2A2A"></div><div class="name">surface-3</div><div class="hex">2A2A2A</div></div>
      <div class="sw"><div class="chip" style="background:#3F3F46"></div><div class="name">rule-bright</div><div class="hex">3F3F46</div></div>
    </div>
  </div>
  <div class="group">
    <div class="gr-lbl">// foreground</div>
    <div class="swatches">
      <div class="sw"><div class="chip" style="background:#FAFAFA"></div><div class="name">fg</div><div class="hex">FAFAFA</div></div>
      <div class="sw"><div class="chip" style="background:#E4E4E7"></div><div class="name">fg-2</div><div class="hex">E4E4E7</div></div>
      <div class="sw"><div class="chip" style="background:#A1A1AA"></div><div class="name">fg-3</div><div class="hex">A1A1AA</div></div>
      <div class="sw"><div class="chip" style="background:#71717A"></div><div class="name">fg-4</div><div class="hex">71717A</div></div>
      <div class="sw"><div class="chip" style="background:#52525B"></div><div class="name">fg-5</div><div class="hex">52525B</div></div>
      <div class="sw"><div class="chip" style="background:#3F3F46"></div><div class="name">fg-6</div><div class="hex">3F3F46</div></div>
    </div>
  </div>
</div></body></html>

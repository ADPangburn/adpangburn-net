<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .og {
    width: 100%;
    aspect-ratio: 1200 / 630;
    background: var(--bg);
    border: 1px solid var(--rule-strong);
    border-left: 4px solid var(--red);
    padding: 5% 6%;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }
  .og .num { font-family: var(--font-mono); font-size: 11px; color: var(--fg-4); letter-spacing: 0.16em; text-transform: uppercase; font-weight: 600; }
  .og .ttl { font-family: var(--font-sans); font-size: 38px; font-weight: 700; line-height: 1.05; color: var(--fg); text-wrap: balance; letter-spacing: -0.025em; }
  .og .prompt { font-family: var(--font-mono); font-size: 13px; display:flex; align-items: baseline; }
  .og .prompt .host { color: var(--fg); font-weight: 600; }
  .og .prompt .at { color: var(--fg-3); }
  .og .prompt .dollar { color: var(--red); margin: 0 4px; }
  .og .prompt .cur { display:inline-block; width: 6px; height: 12px; background: var(--red); margin-left: 3px; transform: translateY(1px); }
  .og .foot { display:flex; flex-direction: column; gap: 8px; padding-top: 14px; border-top: 1px solid var(--rule-strong); }
  .og .by { font-family: var(--font-mono); font-size: 11px; color: var(--fg-4); letter-spacing: 0.10em; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-4); letter-spacing: 0.14em; text-transform: uppercase; margin-top: 12px; font-weight: 600; }
</style>
</head>
<body><div class="card-frame">
  <div class="og">
    <div class="num">// NOTE_017 · 2026·03·12 · 8 MIN</div>
    <div class="ttl">The retry loop is a<br>human-in-the-loop loop.</div>
    <div class="foot">
      <div class="prompt">
        <span class="host">aaron</span><span class="at">@</span><span class="host">pangburn</span><span class="at">:~/notes</span><span class="dollar">$</span><span class="cur"></span>
      </div>
      <div class="by">notes from inside the regulated stack</div>
    </div>
  </div>
  <div class="lbl">// social card · 1200 × 630 · X · LinkedIn · YouTube</div>
</div></body></html>

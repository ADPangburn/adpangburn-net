<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .scale { display:flex; align-items:flex-end; gap: 6px; height: 132px; }
  .step { display:flex; flex-direction:column; align-items:center; gap: 8px; }
  .bar { background: var(--red); width: 36px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-4); }
  .px  { font-family: var(--font-mono); font-size: 9px; color: var(--fg-3); }
</style>
</head>
<body><div class="card-frame">
  <div class="scale">
    <div class="step"><div class="bar" style="height:4px"></div><div class="px">4</div><div class="lbl">1</div></div>
    <div class="step"><div class="bar" style="height:8px"></div><div class="px">8</div><div class="lbl">2</div></div>
    <div class="step"><div class="bar" style="height:12px"></div><div class="px">12</div><div class="lbl">3</div></div>
    <div class="step"><div class="bar" style="height:16px"></div><div class="px">16</div><div class="lbl">4</div></div>
    <div class="step"><div class="bar" style="height:24px"></div><div class="px">24</div><div class="lbl">5</div></div>
    <div class="step"><div class="bar" style="height:32px"></div><div class="px">32</div><div class="lbl">6</div></div>
    <div class="step"><div class="bar" style="height:48px"></div><div class="px">48</div><div class="lbl">7</div></div>
    <div class="step"><div class="bar" style="height:64px"></div><div class="px">64</div><div class="lbl">8</div></div>
    <div class="step"><div class="bar" style="height:96px"></div><div class="px">96</div><div class="lbl">9</div></div>
    <div class="step"><div class="bar" style="height:128px"></div><div class="px">128</div><div class="lbl">10</div></div>
  </div>
  <div style="margin-top:14px;font-family:var(--font-mono);font-size:10px;color:var(--fg-4);letter-spacing:0.14em;text-transform:uppercase;font-weight:600">// 4px base · steps 1–10</div>
</div></body></html>

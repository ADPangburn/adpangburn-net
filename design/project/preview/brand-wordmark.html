<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .stage { display:flex; flex-direction: column; gap: 22px; align-items: center; padding: 14px 0 6px; }
  .wm { font-family: var(--font-mono); font-weight: 600; letter-spacing: 0; display:inline-flex; align-items: baseline; }
  .wm .host { color: var(--fg); }
  .wm .at { color: var(--fg-3); }
  .wm .dollar { color: var(--red); margin: 0 4px; }
  .wm .cur { display:inline-block; background: var(--red); margin-left: 3px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-4); letter-spacing: 0.14em; text-transform: uppercase; font-weight: 600; }
</style>
</head>
<body><div class="card-frame">
  <div class="stage">
    <div class="wm" style="font-size:30px">
      <span class="host">aaron</span><span class="at">@</span><span class="host">pangburn</span><span class="at">:~</span><span class="dollar">$</span><span class="cur" style="width:11px;height:22px;transform:translateY(2px)"></span>
    </div>
    <div class="wm" style="font-size:18px">
      <span class="host">aaron</span><span class="at">@</span><span class="host">pangburn</span><span class="at">:~</span><span class="dollar">$</span><span class="cur" style="width:7px;height:13px;transform:translateY(1px)"></span>
    </div>
    <div class="lbl">// IBM plex mono · semibold · red $ + cursor</div>
  </div>
</div></body></html>

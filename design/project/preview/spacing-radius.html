<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row { display:flex; gap: 18px; align-items: flex-start; }
  .item { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .box { width: 70px; height: 70px; background: var(--surface); border: 1px solid var(--rule-bright); }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-4); letter-spacing: 0.04em; }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
  .rules { display:flex; flex-direction:column; gap: 12px; margin-left: 12px; flex: 1; }
  .rline { display:flex; align-items:center; gap: 14px; }
  .rline .w { width: 140px; }
  .rline .lbl2 { font-family: var(--font-mono); font-size: 10px; color: var(--fg-4); letter-spacing: 0.10em; text-transform: uppercase; }
</style>
</head>
<body><div class="card-frame">
  <div class="row">
    <div class="item">
      <div class="box" style="border-radius:0"></div>
      <div class="name">radius-0</div>
      <div class="lbl">0px · default</div>
    </div>
    <div class="item">
      <div class="box" style="border-radius:2px"></div>
      <div class="name">radius-1</div>
      <div class="lbl">2px · code</div>
    </div>
    <div class="item">
      <div class="box" style="border-radius:4px"></div>
      <div class="name">radius-2</div>
      <div class="lbl">4px · max</div>
    </div>
    <div class="rules">
      <div class="rline"><div class="w" style="border-top: 1px solid #1F1F1F"></div><div class="lbl2">rule · 1F1F1F</div></div>
      <div class="rline"><div class="w" style="border-top: 1px solid #2A2A2A"></div><div class="lbl2">rule-strong · 2A2A2A</div></div>
      <div class="rline"><div class="w" style="border-top: 1px solid #3F3F46"></div><div class="lbl2">rule-bright · 3F3F46</div></div>
      <div class="rline"><div class="w" style="border-top: 2px solid #EF4444"></div><div class="lbl2">accent rule · 2px · red</div></div>
    </div>
  </div>
  <div style="margin-top:14px;font-family:var(--font-mono);font-size:10px;color:var(--fg-4);letter-spacing:0.14em;text-transform:uppercase;font-weight:600">// flat by default · radius-1 is for inline code only</div>
</div></body></html>
